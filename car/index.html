<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHANTOM GT</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#000;
    color:white;
}

.hero{
    height:100vh;
    background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=2000') center/cover no-repeat;
    position:relative;
}

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.65);
}

nav{
    position:absolute;
    width:100%;
    padding:25px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:2;
}

.logo{
    font-size:32px;
    font-weight:bold;
    letter-spacing:5px;
}

.menu a{
    color:white;
    text-decoration:none;
    margin-left:30px;
}

.content{
    position:absolute;
    top:50%;
    left:8%;
    transform:translateY(-50%);
    z-index:2;
}

.content h1{
    font-size:90px;
    line-height:1;
    text-transform:uppercase;
}

.content p{
    margin-top:20px;
    width:500px;
    font-size:18px;
    color:#ddd;
}

.btn{
    margin-top:30px;
    padding:15px 40px;
    background:white;
    border:none;
    cursor:pointer;
    font-weight:bold;
    border-radius:30px;
}

.specs{
    background:#111;
    padding:80px 10%;
    display:flex;
    justify-content:space-around;
    flex-wrap:wrap;
}

.box{
    text-align:center;
    margin:20px;
}

.box h2{
    font-size:50px;
}

.box p{
    color:#999;
}

.gallery{
    padding:80px 10%;
}

.gallery h2{
    text-align:center;
    margin-bottom:40px;
    font-size:40px;
}

.images{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.images img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:15px;
    transition:0.5s;
}

.images img:hover{
    transform:scale(1.05);
}

footer{
    background:#000;
    text-align:center;
    padding:25px;
    color:#888;
}
</style>
</head>

<body>

<section class="hero">

<div class="overlay"></div>

<nav>
    <div class="logo">PHANTOM GT</div>

    <div class="menu">
        <a href="#">Home</a>
        <a href="#">Models</a>
        <a href="#">Performance</a>
        <a href="#">Contact</a>
    </div>
</nav>

<div class="content">
    <h1>Drive<br>The Future</h1>

    <p>
        Crafted for speed. Designed for luxury.
        Engineered to dominate every road.
    </p>

    <button class="btn">Explore Now</button>
</div>

</section>

<section class="specs">

    <div class="box">
        <h2>2.5s</h2>
        <p>0-100 km/h</p>
    </div>

    <div class="box">
        <h2>950HP</h2>
        <p>Power</p>
    </div>

    <div class="box">
        <h2>340</h2>
        <p>Top Speed</p>
    </div>

    <div class="box">
        <h2>800KM</h2>
        <p>Range</p>
    </div>

</section>

<section class="gallery">

<h2>Built To Impress</h2>

<div class="images">
<img src="https://images.unsplash.com/photo-1494976388531-d1058494cdd8?w=1200">
<img src="https://images.unsplash.com/photo-1502877338535-766e1452684a?w=1200">
<img src="https://images.unsplash.com/photo-1552519507-da3b142c6e3d?w=1200">
</div>

</section>

<footer>
© 2026 PHANTOM GT | Luxury Performance Redefined
</footer>

</body>
</html>
