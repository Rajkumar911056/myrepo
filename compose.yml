services:
  carservice:
    image: rajkumar8897/html:carimage
    ports:
      - "1234:80"
    networks:
      - mynetwork
    volumes:
      - mydata:/mypath
    restart: always
    environment:
      my_user: admin
      my_user_password: admin@123
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: 250M
        reservations:
          cpus: "0.1"
          memory: 50M
  bikeservice:
    image: rajkumar8897/html:bikeimage
    ports:
      - "5678:80"
    networks:
      - mynetwork
    volumes:
      - mydata:/mypath
    restart: always
    environment:
      my_user: admin
      my_user_password: admin@123
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: 250M
        reservations:
          cpus: "0.1"
          memory: 50M

  foodservice:
    image: rajkumar8897/html:foodimage
    ports:
      - "4321:80"
    networks:
      - mynetwork
    volumes:
      - mydata:/mypath
    restart: always
    environment:
      my_user: admin
      my_user_password: admin@123
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "0.5"
          memory: 250M
        reservations:
          cpus: "0.1"
          memory: 50M

networks:
  mynetwork:
    driver: overlay
    attachable: true

volumes:
  mydata:

